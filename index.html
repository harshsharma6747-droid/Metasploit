<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 G-GHOST | COMMAND CENTER</title>
    <style>
        :root { --bg: #050505; --card: #111; --neon: #bc13fe; --error: #ff3131; --ok: #00ff41; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', monospace; margin: 0; padding: 15px; }
        
        .panel { background: var(--card); border: 2px solid var(--neon); border-radius: 20px; padding: 20px; max-width: 500px; margin: auto; box-shadow: 0 0 40px rgba(188,19,254,0.2); }
        .status-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        
        .status-pill { padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; letter-spacing: 1px; }
        .status-RUNNING { background: var(--ok); color: #000; animation: pulse 1s infinite; }
        .status-IDLE { background: #333; color: #888; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .task-box { background: #000; padding: 15px; border-radius: 12px; border-left: 4px solid var(--neon); margin-bottom: 15px; }
        .error-box { background: rgba(255, 49, 49, 0.1); border: 1px solid var(--error); color: var(--error); padding: 15px; border-radius: 12px; font-size: 11px; display: none; }

        .label { font-size: 10px; color: #666; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .val { font-size: 14px; font-weight: bold; color: #eee; }
    </style>
</head>
<body>

<div class="panel">
    <div class="status-header">
        <div style="font-size: 18px; font-weight: 900; color: var(--neon);">🔱 G-GHOST COMMAND</div>
        <div id="status-pill" class="status-pill status-IDLE">IDLE</div>
    </div>

    <div class="task-box">
        <span class="label">Current Activity</span>
        <div id="task-val" class="val">Standing by for next cron...</div>
    </div>

    <div class="task-box" style="border-left-color: #00f2ff;">
        <span class="label">Last Engine Update</span>
        <div id="time-val" class="val">--:--:--</div>
    </div>

    <div id="error-display" class="error-box">
        <span style="font-weight:bold;">🚨 LAST ERROR DETECTED:</span><br>
        <span id="error-val">None</span>
    </div>
</div>

<script>
    async function sync() {
        try {
            const res = await fetch("https://bomb-aa638-default-rtdb.firebaseio.com/sora_vault/system_logs.json?nocache=" + Date.now());
            const data = await res.json();
            
            if (data) {
                const pill = document.getElementById('status-pill');
                pill.innerText = data.status || "IDLE";
                pill.className = `status-pill status-${data.status}`;
                
                document.getElementById('task-val').innerText = data.current_task || "Waiting...";
                document.getElementById('time-val').innerText = new Date(data.last_update).toLocaleTimeString();
                
                if (data.last_error) {
                    document.getElementById('error-display').style.display = 'block';
                    document.getElementById('error-val').innerText = data.last_error;
                } else {
                    document.getElementById('error-display').style.display = 'none';
                }
            }
        } catch (e) {}
    }

    setInterval(sync, 5000);
    sync();
</script>
</body>
</html>
