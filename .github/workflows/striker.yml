name: 🔱 G-GHOST ETERNAL STRIKER

on:
  schedule:
    - cron: '*/10 * * * *' # हर 10 मिनट में ऑटो-ट्रिगर
  workflow_dispatch:      # मैन्युअल बटन

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Cloning Repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🛠️ Install Chrome Dependencies
        # Puppeteer को Linux पर चलाने के लिए आवश्यक Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget unzip fontconfig locales gconf-service libasound2 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 ca-certificates fonts-liberation libappindicator1 libnss3 lsb-release xdg-utils

      - name: 🚀 Run Chronos Engine
        run: node striker.js
